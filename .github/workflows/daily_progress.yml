name: Professional Dev Journey
on:
  schedule:
    - cron: '0 8-21 * * 1-6' # Pazar hariç, mesai saatleri
  workflow_dispatch:

jobs:
  professional_work:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Human-Like Development
        run: |
          # %45 ihtimalle mola ver (Daha insansı bir grafik için)
          if [ $((RANDOM % 100)) -lt 45 ]; then
            echo "Şu an kahve molasında, işlem yapılmadı."
            exit 0
          fi

          # Rastgele dosya seçimi (Hangi dosyada çalışılacağı)
          FILES=("README.md" "progress_log.txt" "notes.md")
          TARGET_FILE=${FILES[$RANDOM % ${#FILES[@]}]}
          
          # Rastgele profesyonel aksiyonlar
          ACTIONS=("Refined the project description" "Updated technical notes" "Added daily progress marker" "Cleaned up redundant logs" "Optimized file structure")
          SELECTED_ACTION=${ACTIONS[$RANDOM % ${#ACTIONS[@]}]}
          
          # Değişikliği dosyaya ekle
          echo "- $(date +'%Y-%m-%d %H:%M'): $SELECTED_ACTION" >> $TARGET_FILE
          
          # Profesyonel Commit Mesajları
          MESSAGES=("docs: update project technical documentation" "refactor: optimize markdown structure" "chore: sync daily development logs" "style: fix formatting in core files" "docs: refine README for better clarity")
          SELECTED_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          
          git config --global user.name 'Wickedrobber'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "$SELECTED_MSG"
          git push
